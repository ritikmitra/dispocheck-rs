name: Bug report
description: Something in the crate itself isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For a missing/incorrect *domain* (not a code bug), please open a PR
        against the upstream data source instead — see CONTRIBUTING.md.
  - type: input
    id: version
    attributes:
      label: Crate version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: rustc
    attributes:
      label: rustc --version output
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A small code snippet showing the input and the unexpected output.
      render: rust
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual behavior
    validations:
      required: true
